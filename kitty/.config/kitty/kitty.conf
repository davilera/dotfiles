# UX {{{
include ~/.config/omarchy/current/theme/kitty.conf

# Some tweaks
active_tab_background #8bb2fa
inactive_tab_foreground #bbbbdd
inactive_tab_background #1f1f2a

enable_audio_bell  no
resize_in_steps    yes

tab_bar_min_tabs   1
tab_bar_style      separator
tab_separator      ""
tab_title_template " {index}: {title[:15]} "
tab_bar_min_tabs   2

enabled_layouts splits

active_tab_font_style   bold
inactive_tab_font_style normal

window_padding_width 4
# }}}

# Keyboard Shortcuts {{{
map ctrl+shift+t launch --type=tab --cwd=current
map ctrl+comma previous_tab
map ctrl+dot next_tab

map alt+x launch --location=hsplit
map alt+v launch --location=vsplit
map alt+h neighboring_window left
map alt+l neighboring_window right
map alt+k neighboring_window up
map alt+j neighboring_window down

map ctrl+1 goto_tab 1
map ctrl+2 goto_tab 2
map ctrl+3 goto_tab 3
map ctrl+4 goto_tab 4
map ctrl+5 goto_tab 5
map ctrl+6 goto_tab 6
map ctrl+7 goto_tab 7
map ctrl+8 goto_tab 8
map ctrl+9 goto_tab 9
# }}}

# Editing magic {{{
allow_remote_control true
listen_on unix:/tmp/kitty.sock
# [O]pen path in VIM
map ctrl+shift+o kitten hints --type=path --alphabet abcdefghijklmnopqrstuvwxyz --hints-offset 0 --program /home/david/.local/bin/kitty-edit-path
# Path [N]ames to clipboard
map ctrl+shift+n kitten hints --type=regex --regex '(?:\./)?(/?(?:[a-zA-Z0-9_.-]+/)*[a-zA-Z0-9_-]*[a-zA-Z_-][a-zA-Z0-9_-]*(?:\.[a-zA-Z0-9_-]+)+)' --alphabet abcdefghijklmnopqrstuvwxyz --hints-offset 0 --program @
# [M]ore than just paths to clipboard
map ctrl+shift+m kitten hints --type=regex --regex '[a-zA-Z-_/.~@]+' --alphabet abcdefghijklmnopqrstuvwxyz --hints-offset 0 --ascending --program @
# }}}


# BEGIN_KITTY_FONTS
font_family      family='JetBrainsMono Nerd Font' style=Light
bold_font        auto
italic_font      family='JetBrainsMono Nerd Font' postscript_name=JetBrainsMonoNF-LightItalic
bold_italic_font auto
# END_KITTY_FONTS
