# Application bindings
$terminal = uwsm app -- kitty
$browser = omarchy-launch-browser

bindd = SUPER ALT, B, Browser, exec, $browser
bindd = SUPER ALT, D, Blender, exec, blender
bindd = SUPER ALT, F, File Explorer, exec, nautilus
bindd = SUPER ALT, G, ChatGPT, exec, firefox-launch-webapp "ChatGPT"
bindd = SUPER ALT, S, Stats (btop), exec, [float;size 1200 800;center] $terminal -e btop
bindd = SUPER ALT, T, Terminal, exec, $terminal --working-directory=$(omarchy-cmd-terminal-cwd)
bindd = SUPER ALT, W, WhatsApp Web, exec, firefox-launch-webapp "WhatsApp"
